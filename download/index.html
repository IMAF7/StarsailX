<!DOCTYPE html>

  <style>

      --muted: #9aa8be;
      --accent: #3b82f6;

    body {

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .logo {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px var(--glow);
    }

    h1 {

      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .version {
      display: inline-block;
      font-size: 13px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 999px;

    .desc {

      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 28px;

    .btn-download {

      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 24px var(--glow);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px var(--glow);
      background: linear-gradient(135deg, var(--accent-hover), #4f46e5);

    .btn-download svg {

      height: 20px;
      fill: currentColor;
    }

    .meta {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
    }

    .meta a {
      color: #93c5fd;
      text-decoration: none;
    }

    .meta a:hover { text-decoration: underline; }

    .requirements {
      margin-top: 28px;
      padding-top: 24px;

      text-align: left;
    }

    .requirements h2 {

      font-weight: 600;
      color: var(--text);

    }

    .requirements ul {
      list-style: none;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.9;
    }

    .requirements li::before {
      content: "·";
      margin-right: 8px;
      color: var(--accent);
    }

    @media (max-width: 480px) {

</head>
