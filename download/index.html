<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarsailX — 下载</title>
  <meta name="description" content="StarsailX Starsail 网页版多开客户端官方下载">
  <link rel="icon" href="../logo.png" type="image/png">
  <style>
    :root {
      --bg-deep: #141a24;
      --bg-mid: #1a2230;
      --surface: rgba(255, 255, 255, 0.045);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #eef1f6;
      --muted: #8b95a8;
      --accent: #4a7fd4;
      --accent-bright: #6a9ae8;
      --gold: #c9b07a;
      --radius: 4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(74, 127, 212, 0.12), transparent),
        linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-deep) 55%);
      pointer-events: none;
      z-index: 0;
    }

    .top-bar {
      position: relative;
      z-index: 1;
      height: 2px;
      background: linear-gradient(90deg, transparent 5%, var(--gold) 50%, transparent 95%);
      opacity: 0.7;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1080px;
      margin: 0 auto;
      padding: 56px 32px 72px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      align-items: center;
      margin-bottom: 56px;
      padding-bottom: 56px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 20px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      border: 1px solid var(--border-strong);
    }

    h1 {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .version {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    .lead {
      font-size: 16px;
      color: var(--muted);
      max-width: 420px;
      margin-bottom: 32px;
      line-height: 1.75;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 22px;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent-bright);
    }
    .btn-primary:hover { background: var(--accent-bright); }

    .btn-outline {
      color: var(--text);
      background: transparent;
      border-color: var(--border-strong);
    }
    .btn-outline:hover {
      background: var(--surface-hover);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .meta-line {
      font-size: 13px;
      color: var(--muted);
    }
    .meta-line span + span::before {
      content: "·";
      margin: 0 8px;
      opacity: 0.5;
    }

    .copy-status {
      font-size: 13px;
      color: var(--gold);
      min-height: 20px;
      margin-top: 4px;
    }

    .brand-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
    }
    .brand-panel img {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border-strong);
    }
    .brand-panel p {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.02em;
    }

    .footer {
      padding-top: 32px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: var(--text); }

    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
      .page { padding: 40px 20px 56px; }
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">Official Release</p>
        <div class="brand-row">
          <img class="logo" src="../logo.png" alt="" width="52" height="52">
          <div>
            <h1>StarsailX</h1>
            <div class="version" id="version-tag">Version 2.2.1</div>
          </div>
        </div>
        <p class="lead">
          Starsail 网页版多开客户端。多账号独立会话、消息通知与 Cookie 持久化，轻量稳定，面向日常协作场景。
        </p>
        <div class="cta-row">
          <a class="btn btn-primary" id="download-btn" href="#" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/></svg>
            下载 Windows 安装包
          </a>
          <button class="btn btn-outline" id="copy-btn" type="button">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            复制下载链接
          </button>
          <a class="btn btn-outline" id="releases-link" href="#" target="_blank" rel="noopener">历史版本</a>
        </div>
        <p class="meta-line">
          <span id="file-info">StarsailX_Setup_2.2.1.exe</span>
          <span>约 157 MB</span>
          <span>Windows x64</span>
        </p>
        <p class="copy-status" id="copy-status" aria-live="polite"></p>
      </div>
      <div class="brand-panel">
        <img src="../logo.png" alt="StarsailX">
        <p>Starsail 网页版多开<br>Unicode 表情面板 · 自动登录 · 消息通知</p>
      </div>
    </section>

    <footer class="footer">
      <span>Copyright &copy; 2026 IMAF7</span>
      <nav class="footer-links">

        <a href="../LICENSE" target="_blank" rel="noopener">MIT License</a>
        <a href="https://github.com/IMAF7/StarsailX" target="_blank" rel="noopener">项目主页</a>
      </nav>
    </footer>
  </div>

  <script>
    (function () {
      var GITHUB_REPO = "IMAF7/StarsailX";
      var VERSION = "2.2.1";
      var SETUP_NAME = "StarsailX_Setup_" + VERSION + ".exe";
      var downloadUrl = "https://github.com/" + GITHUB_REPO + "/releases/latest/download/" + SETUP_NAME;

      document.getElementById("download-btn").href = downloadUrl;
      document.getElementById("releases-link").href = "https://github.com/" + GITHUB_REPO + "/releases";
      document.getElementById("version-tag").textContent = "Version " + VERSION;

      function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.style.cssText = "position:fixed;left:-9999px;top:0;opacity:0";
          document.body.appendChild(ta);
          ta.select();
          ta.setSelectionRange(0, text.length);
          try {
            document.execCommand("copy") ? resolve() : reject();
          } catch (e) { reject(e); }
          document.body.removeChild(ta);
        });
      }

      document.getElementById("copy-btn").addEventListener("click", function () {
        var status = document.getElementById("copy-status");
        copyText(downloadUrl).then(function () {
          status.textContent = "下载链接已复制";
        }).catch(function () {
          status.textContent = "请手动复制：" + downloadUrl;
        });
      });
    })();
  </script>
</body>
</html>
