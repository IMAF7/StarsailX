<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarsailX — 下载</title>
  <meta name="description" content="StarsailX Starsail 网页版多开客户端官方下载">
  <link rel="icon" href="../logo.png" type="image/png">
  <style>
    :root {
      --bg-deep: #141a24;
      --bg-mid: #1a2230;
      --surface: rgba(255, 255, 255, 0.045);
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #eef1f6;
      --muted: #8b95a8;
      --accent: #4a7fd4;
      --accent-bright: #6a9ae8;
      --gold: #c9b07a;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg-deep);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
      padding: 32px 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(74, 127, 212, 0.12), transparent),
        linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-deep) 55%);
      pointer-events: none;
      z-index: 0;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1;
      height: 2px;
      background: linear-gradient(90deg, transparent 5%, var(--gold) 50%, transparent 95%);
      opacity: 0.7;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 40px 36px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      border: 1px solid var(--border-strong);
      margin-bottom: 20px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 4px;
    }

    .version {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .lead {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 28px;
      text-align: left;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius);
      border: 1px solid var(--accent-bright);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      font-family: inherit;
      color: #fff;
      background: var(--accent);
      margin-bottom: 16px;
    }
    .btn:hover { background: var(--accent-bright); }
    .btn.is-loading { opacity: 0.75; pointer-events: none; }

    .btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .meta-line {
      font-size: 12px;
      color: var(--muted);
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .meta-line span + span::before {
      content: "·";
      margin: 0 8px;
      opacity: 0.5;
    }

    .download-hint {
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
      margin-top: -8px;
      margin-bottom: 4px;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; }
      h1 { font-size: 26px; }
      .logo { width: 68px; height: 68px; }
    }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <main class="card">
    <p class="eyebrow">Official Release</p>
    <img class="logo" src="../logo.png" alt="StarsailX" width="80" height="80">
    <h1>StarsailX</h1>
    <div class="version" id="version-tag">Version 2.2.1</div>
    <p class="lead">
      Starsail 网页版多开客户端。多账号独立会话、消息通知与 Cookie 持久化，轻量稳定，面向日常协作场景。
    </p>
    <button class="btn" id="download-btn" type="button">
      <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/></svg>
      <span id="btn-text">下载 Windows 安装包</span>
    </button>
    <p class="download-hint" id="download-hint" aria-live="polite"></p>
    <p class="meta-line">
      <span id="file-info">StarsailX_Setup_2.2.1.exe</span>
      <span>约 157 MB</span>
      <span>Windows x64</span>
    </p>
  </main>

  <script>
    (function () {
      document.addEventListener("contextmenu", function (e) { e.preventDefault(); });
      document.addEventListener("keydown", function (e) {
        var k = e.keyCode || e.which;
        if (k === 123) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.shiftKey && (k === 73 || k === 74 || k === 67)) { e.preventDefault(); return false; }
        if (e.ctrlKey && k === 85) { e.preventDefault(); return false; }
      });

      var VERSION = "2.2.1";
      var SETUP_NAME = "StarsailX_Setup_" + VERSION + ".exe";
      var downloadUrl = "https://github.com/IMAF7/StarsailX/releases/download/v" + VERSION + "/" + SETUP_NAME;

      var dlFrame = document.createElement("iframe");
      dlFrame.style.cssText = "position:absolute;width:0;height:0;border:0;opacity:0;pointer-events:none";
      dlFrame.setAttribute("aria-hidden", "true");
      dlFrame.title = "";
      document.body.appendChild(dlFrame);

      var btn = document.getElementById("download-btn");
      var btnText = document.getElementById("btn-text");
      var hint = document.getElementById("download-hint");
      var resetTimer = null;

      btn.addEventListener("click", function () {
        if (btn.classList.contains("is-loading")) return;
        btn.classList.add("is-loading");
        btnText.textContent = "正在下载…";
        hint.textContent = "已开始下载，请查看浏览器下载栏";
        dlFrame.src = downloadUrl;
        clearTimeout(resetTimer);
        resetTimer = setTimeout(function () {
          btn.classList.remove("is-loading");
          btnText.textContent = "下载 Windows 安装包";
        }, 4000);
      });

      document.getElementById("version-tag").textContent = "Version " + VERSION;
    })();
  </script>
</body>
</html>
